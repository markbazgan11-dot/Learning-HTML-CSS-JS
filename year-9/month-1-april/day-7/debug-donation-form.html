<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Donation Form</title>
  </head>
  <body>
    <h1>Donation Form</h1>
    <form>
      <label for="name-input">Full Name:</label>
      <input type="text" name="name" id="name-input" required />

      <label for="email-input">Email Address:</label>
      <input type="email" name="email" id="email-input" required />

      <label for="amount-input">Donation Amount ($):</label>
      <input type="number" name="amount" id="amount-input" required />

      <label for="newsletter-subscription">Subscribe</label>
      <input type="checkbox" name="newsletter" id="newsletter-subscription" />

      <input type="submit" value="Send" />
    </form>
  </body>
</html>
