<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link ref="stylesheet" href="styles.css" />
    <title>Styled To-Do List</title>
  </head>
  <body>
    <h1 id="title">Daily Tracker</h1>
    <ul class="todo-list">
      <li>
        <input type="checkbox" id="Revision-Input" />
        <label for="Revision-Input">Have You Revised Front-End?</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://freecodecamp.org"
              target="_blank"
              >Front-End Revision Guide</a
            >
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" id="Cybersec-Input" />
        <label for="Cybersec-Input">Have You Revised Cyber Security?</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://tryhackme.com"
              target="_blank"
              >Cyber Security Revision Guide</a
            >
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" id="Maths-Input" />
        <label for="Maths-Input">Have You Revised Maths?</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://corbettmaths.com"
              target="_blank"
              >Maths Revision Guide</a
            >
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" id="Physics-Input" />
        <label for="Physics-Input">Have You revised Physics?</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://www.century.tech"
              target="_blank"
              >Physics Revision Guide</a
            >
          </li>
        </ul>
      </li>
    </ul>
  </body>
</html>
